<div class="modal-header">
  <h4 class="modal-title">{{ appointment?._id ? 'Editar turno' : 'Nuevo turno' }}</h4>
  <button type="button" class="close" aria-label="Cerrar" (click)="cancel()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>

<div class="modal-body">
  <form [formGroup]="form" (ngSubmit)="$event.preventDefault()">
    <div class="form-group">
      <label for="appt-company">Empresa</label>
      <app-typeahead-dropdown
        [control]="companyControl"
        [data]="companies"
        [keyField]="'_id'"
        [displayField]="'name'"
        placeholder="Buscar empresa"
      ></app-typeahead-dropdown>
    </div>
    <div class="form-group">
      <label for="appt-title">Título</label>
      <input id="appt-title" class="form-control" formControlName="title" maxlength="200" />
    </div>
    <div class="form-group">
      <label for="appt-desc">Descripción</label>
      <textarea id="appt-desc" class="form-control" formControlName="description" rows="2"></textarea>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="appt-allday" formControlName="allDay" />
      <label class="form-check-label" for="appt-allday">Todo el día</label>
    </div>
    <div class="form-row">
      <div class="form-group col-md-6">
        <label for="appt-start">Inicio</label>
        <input id="appt-start" class="form-control" type="datetime-local" formControlName="startLocal" />
      </div>
      <div class="form-group col-md-6">
        <label for="appt-end">Fin</label>
        <input id="appt-end" class="form-control" type="datetime-local" formControlName="endLocal" />
      </div>
    </div>
    <p class="form-text text-muted small mb-3">Las fechas y horas se interpretan en hora Argentina (UTC−3).</p>
    <div class="form-group">
      <label for="appt-status">Estado</label>
      <select id="appt-status" class="form-control" formControlName="status">
        <option *ngFor="let o of statusOptions" [ngValue]="o.value">{{ o.label }}</option>
      </select>
    </div>
  </form>
</div>

<div class="modal-footer d-flex justify-content-between">
  <div>
    <button
      *ngIf="appointment?._id"
      type="button"
      class="btn btn-outline-danger"
      [disabled]="loading"
      (click)="delete()"
    >
      Eliminar
    </button>
  </div>
  <div>
    <button type="button" class="btn btn-secondary mr-2" [disabled]="loading" (click)="cancel()">Cancelar</button>
    <button type="button" class="btn btn-primary" [disabled]="loading" (click)="save()">
      <span *ngIf="loading" class="spinner-border spinner-border-sm mr-1" role="status"></span>
      Guardar
    </button>
  </div>
</div>
