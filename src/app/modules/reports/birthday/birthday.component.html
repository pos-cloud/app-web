<section class="container-fluid">
  <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap">
    <div class="form-group mr-2">
      <label for="day" class="control-label">
        <b>{{ 'days' | translate | capitalize }}</b></label
      >
      <input type="number" class="form-control" [(ngModel)]="day" (keyup.enter)="getReport()" />
    </div>
    <div class="form-group mr-2">
      <label for="months" class="control-label">
        <b>{{ 'months' | translate | capitalize }}</b>
      </label>
      <app-multi-select-dropdown [data]="months" [(ngModel)]="monthsSelect" placeholder="Mes">
      </app-multi-select-dropdown>
    </div>
    <div class="form-group mr-2 flex-grow-1" style="min-width: 280px">
      <label for="whatsappMessage" class="control-label">
        <b>Mensaje predeterminado</b>
      </label>
      <div class="input-group">
        <input
          id="whatsappMessage"
          type="text"
          class="form-control"
          [(ngModel)]="whatsappMessage"
        />
        <div class="input-group-append">
          <button
            type="button"
            class="btn btn-outline-secondary"
            [ngbTooltip]="whatsappMessageHelp"
            container="body"
            triggers="click hover focus"
            tabindex="0"
            aria-label="Ayuda sobre el mensaje predeterminado"
          >
            <i class="fa fa-question-circle"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Botón de Actualizar -->
    <div class="form-group ml-auto">
      <label class="control-label"> </label>
      <button class="btn btn-primary" (click)="getReport()">
        <i [ngClass]="{ 'fa fa-refresh fa-spin': loading }"></i> {{ 'refresh' | translate | capitalize }}
      </button>
    </div>
  </div>
  <app-data-table-reports
    [data]="data"
    [columns]="columns"
    [totals]="totals"
    [title]="title"
    [loading]="loading"
    [rowButtons]="rowButtons"
    [(sorting)]="sort"
    (sortingChange)="onSortingChange($event)"
    (eventExport)="onExportExcel($event)"
    (eventFunction)="onEventFunction($event)"
  >
  </app-data-table-reports>
</section>
