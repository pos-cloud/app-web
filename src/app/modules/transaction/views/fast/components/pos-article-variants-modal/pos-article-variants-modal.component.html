<div class="modal-header">
  <h5 class="modal-title">Variantes</h5>
  <button type="button" class="close" aria-label="Cerrar" (click)="dismiss()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<div class="modal-body">
  <p class="mb-2 text-muted">{{ articleLabel }}</p>

  <div *ngIf="loading" class="text-center py-3">
    <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
  </div>

  <p *ngIf="!loading && errorMessage" class="text-danger mb-0">{{ errorMessage }}</p>

  <ng-container *ngIf="!loading && !errorMessage">
    <div class="pos-variant-type mb-3" *ngFor="let type of variantTypes">
      <div class="font-weight-bold mb-1">{{ type.name }}</div>
      <div class="d-flex flex-wrap">
        <button
          type="button"
          class="btn btn-sm mr-1 mb-1"
          *ngFor="let variant of getVariantsForType(type)"
          [ngClass]="isSelected(type, variant.value?.description) ? 'btn-primary' : 'btn-outline-secondary'"
          (click)="selectValue(type, variant.value?.description)"
        >
          {{ variant.value?.description }}
        </button>
      </div>
    </div>
  </ng-container>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-light" (click)="dismiss()">Cancelar</button>
  <button type="button" class="btn btn-primary" [disabled]="!canConfirm || loading" (click)="confirm()">
    Agregar
  </button>
</div>
