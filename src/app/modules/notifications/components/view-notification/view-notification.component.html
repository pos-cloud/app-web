<div class="modal-header">
  <h4 class="modal-title">{{ notification?.title || ('notification' | translate | capitalize) }}</h4>
  <button type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('close_click')">
    <span aria-hidden="true">&times;</span>
  </button>
</div>

<section class="container-fluid">
  <div class="modal-body">
    <div class="row">
      <div class="form-group col-md-8">
        <label class="control-label">{{ 'title' | translate | capitalize }}:</label>
        <input type="text" class="form-control" [value]="notification?.title || ''" readonly />
      </div>
      <div class="form-group col-md-4">
        <label class="control-label">{{ 'type' | translate | capitalize }}:</label>
        <input type="text" class="form-control" [value]="notification?.type || ''" readonly />
      </div>
    </div>

    <div class="row" *ngIf="notification?.creationDate">
      <div class="form-group col-md-4">
        <label class="control-label">{{ 'date' | translate | capitalize }}:</label>
        <input type="text" class="form-control" [value]="notification?.creationDate" readonly />
      </div>
    </div>

    <div class="row">
      <div class="form-group col-md-12">
        <label class="control-label">{{ 'message' | translate | capitalize }}:</label>
        <textarea class="form-control" rows="5" readonly>{{ notification?.message }}</textarea>
      </div>
    </div>

    <div class="row" *ngIf="link">
      <div class="form-group col-md-12">
        <label class="control-label">{{ 'link' | translate | capitalize }}:</label>
        <div class="input-group">
          <input type="text" class="form-control" [value]="link" readonly />
          <div class="input-group-append">
            <button type="button" class="btn btn-success" (click)="openLink()" title="Abrir link">
              <i class="fa fa-external-link"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="row" *ngIf="hasPayload">
      <div class="form-group col-md-12">
        <label class="control-label">{{ 'detail' | translate | capitalize }}:</label>
        <pre class="bg-light p-2 rounded" style="max-height: 300px; overflow: auto">{{ notification?.payload | json }}</pre>
      </div>
    </div>
  </div>
</section>
