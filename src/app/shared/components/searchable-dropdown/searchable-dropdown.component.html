<div class="searchable-dropdown-container" [id]="uniqueId">
  <div class="input-container" (click)="toggleDropdown()" [class.disabled]="disabled" [class.is-invalid]="isInvalid">
    <div class="selected-items-display">
      <div class="selected-text" [class.placeholder]="!hasSelection()">
        {{ getSelectedDisplayText() }}
      </div>
    </div>
    <div class="dropdown-arrow">
      <i class="fa" [ngClass]="{ 'fa-chevron-down': !isOpen, 'fa-chevron-up': isOpen }"></i>
    </div>
  </div>

  <div *ngIf="isOpen" class="dropdown-panel" [style.max-height]="maxHeight">
    <div class="search-container">
      <i class="fa fa-search search-icon"></i>
      <input
        type="text"
        class="search-input"
        [(ngModel)]="searchTerm"
        [ngModelOptions]="{ standalone: true }"
        (ngModelChange)="onSearchChange()"
        [placeholder]="searchPlaceholder"
        (click)="$event.stopPropagation()"
      />
    </div>

    <div class="items-container">
      <div *ngIf="searching" class="no-results">
        <i class="fa fa-spinner fa-spin"></i> Buscando...
      </div>

      <div *ngIf="!searching && filteredItems.length === 0" class="no-results">
        {{ emptyMessage }}
      </div>

      <div *ngFor="let item of filteredItems; trackBy: trackByItem" class="item-wrapper">
        <div
          class="dropdown-item"
          [style.padding-left]="getItemPadding(item.level || 0)"
          [class.selected]="isSelected(item)"
          (click)="selectItem(item); $event.stopPropagation()"
        >
          <div class="item-content">
            <span class="item-text">{{ getItemDisplay(item) }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
